name: Build & Deploy Docs

on:
  push:
    branches: [master, main]
    paths:
      - "src/**"
      - "docs/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build Sphinx HTML (warnings as errors)
        run: sphinx-build -b html -W --keep-going -n docs/source docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    # v0.43.15: deploy only fires when the repo-level
    # ENABLE_PAGES_DEPLOY variable is set to "true". GitHub Pages must
    # be enabled at repo settings for deploy to succeed; skipping by
    # default keeps the workflow green for contributors who don't need
    # the published HTML (the artifact from build-docs is still
    # available for manual download).
    if: vars.ENABLE_PAGES_DEPLOY == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
