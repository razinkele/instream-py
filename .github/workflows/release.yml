name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    # pypa/gh-action-pypi-publish@v1 needs id-token:write to either use
    # OIDC trusted publishing OR read the ACTIONS_ID_TOKEN env var that
    # its own pre-flight check requires. Without this permission, v0.44.1
    # and v0.44.2 PyPI runs failed with "OIDC token retrieval failed"
    # even though PYPI_API_TOKEN was set.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Build package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
