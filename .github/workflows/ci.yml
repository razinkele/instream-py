name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        # Ignored rules (deliberately, case-by-case justified):
        #   E501 line-length — enforced by editor config, not CI
        #   F841 unused-local-variable — tests bind row values for clarity
        #   F401 unused-import — calibration/__init__ re-exports without
        #        __all__; legitimate pattern for public-API modules
        #   E402 module-level import not at top — src/salmopy/io/config.py
        #        has a deliberate late import due to circular-dep avoidance
        # The remaining W/E rules stay enforced.
        run: ruff check src/ tests/ --select E,F,W --ignore E501,F841,F401,E402

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (fast only)
        run: |
          pytest tests/ -q --tb=short -m "not slow" --ignore=tests/_debug_alignment.py --ignore=tests/test_e2e_spatial.py --ignore=tests/e2e

      - name: Coverage gate
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ -q --tb=short -m "not slow" --ignore=tests/_debug_alignment.py --ignore=tests/test_e2e_spatial.py --ignore=tests/e2e --cov=salmopy --cov-report=term-missing --cov-fail-under=80

  test-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run slow tests
        run: |
          pytest tests/ -q --tb=short -m slow --ignore=tests/_debug_alignment.py --ignore=tests/test_e2e_spatial.py --ignore=tests/e2e
