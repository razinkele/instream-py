# Tornionjoki -- physical-geography domain (v0.45).
# 4 reaches (Mouth/Lower/Middle/Upper) along the real river
# centerline. Shapefile generated via
# scripts/_generate_wgbast_physical_domains.py.
#
simulation:
  start_date: '2011-04-01'
  end_date: '2016-03-31'
  output_frequency: 1
  output_units: days
  seed: 42
  census_days:
  - 06-15
  - 09-30
  census_years_to_skip: 0
  population_file: TornionjokiExample-InitialPopulations.csv
  adult_arrival_file: TornionjokiExample-AdultArrivals.csv
  m74_forcing_csv: data/wgbast/m74_ysfm_series.csv
performance:
  backend: numpy
  device: cpu
  trout_capacity: 12000
  redd_capacity: 3000
  jit_warmup: false
spatial:
  backend: shapefile
  mesh_file: Shapefile/TornionjokiExample.shp
  gis_properties:
    cell_id: ID_TEXT
    reach_name: REACH_NAME
    area: AREA
    dist_escape: M_TO_ESC
    num_hiding_places: NUM_HIDING
    frac_vel_shelter: FRACVSHL
    frac_spawn: FRACSPWN
light:
  latitude: 65.85
  light_correction: 0.65
  light_at_night: 0.5
  twilight_angle: 6.0
species:
  BalticAtlanticSalmon:
    is_anadromous: true
    display_color: silver
    cmax_A: 0.303
    cmax_B: -0.275
    cmax_temp_table:
      0.0: 0.0
      4.0: 0.3
      8.0: 0.7
      13.0: 0.95
      16.0: 1.0
      18.0: 0.6
      19.0: 0.3
      20.0: 0.0
    weight_A: 0.0077
    weight_B: 3.05
    spawn_start_day: 10-15
    spawn_end_day: 11-30
    kelt_survival_prob: 0.25
    min_kelt_condition: 0.5
    capture_R1: 1.3
    capture_R9: 0.4
    emerge_length_min: 3.0
    emerge_length_mode: 3.5
    emerge_length_max: 4.0
    react_dist_A: 4.0
    react_dist_B: 2.0
    turbid_threshold: 5.0
    turbid_min: 0.1
    turbid_exp: -0.116
    light_threshold: 20.0
    light_min: 0.5
    light_exp: -0.2
    energy_density: 5900
    fitness_horizon: 60
    fitness_length: 15
    max_speed_A: 2.8
    max_speed_B: 21.0
    max_speed_C: -0.0029
    max_speed_D: 0.084
    max_speed_E: 0.37
    migrate_fitness_L1: 4.0
    migrate_fitness_L9: 10.0
    move_radius_max: 20000
    move_radius_L1: 7
    move_radius_L9: 20
    pisciv_length: 20
    resp_A: 36
    resp_B: 0.783
    resp_C: 0.002
    resp_D: 1.4
    search_area: 20000
    spawn_defense_area: 100  # v0.52.2: 100 cm = 1 m radius → ~3.14 m² redd footprint. Was 0 → triggered legacy 50%-loss superimposition path which wiped 96% of eggs when multiple females spawned on the same cell. Real Atlantic salmon redds are ~1-3 m².
    spawn_egg_viability: 0.8
    spawn_fecund_mult: 690
    spawn_fecund_exp: 0.552
    spawn_suitability_tol: 0.1
    spawn_max_flow_change: 0.2
    spawn_max_temp: 14
    spawn_min_age: -9
    spawn_min_length: -9
    spawn_min_cond: -9
    spawn_min_temp: 1  # v0.52.0 B5: was 5; Tornionjoki autumn temps are 100% <5°C in spawn window (max 2.7°C). Subarctic Atlantic salmon spawn at 0-5°C (Webb & McLay 1996).
    spawn_prob: 0.1
    spawn_wt_loss_fraction: 0.4
    mort_high_temp_T1: 28.0
    mort_high_temp_T9: 24.0
    mort_strand_survival_when_dry: 0.5
    mort_condition_S_at_K8: 0.999
    mort_condition_S_at_K5: 0.99
    mort_terr_pred_L1: 6.0
    mort_terr_pred_L9: 3.0
    mort_terr_pred_D1: 0.0
    mort_terr_pred_D9: 200
    mort_terr_pred_V1: 20
    mort_terr_pred_V9: 300
    mort_terr_pred_I1: 50
    mort_terr_pred_I9: -10
    mort_terr_pred_H1: 200
    mort_terr_pred_H9: -50
    mort_terr_pred_hiding_factor: 0.8
    mort_fish_pred_L1: 3.0
    mort_fish_pred_L9: 6.0
    mort_fish_pred_D1: 35
    mort_fish_pred_D9: 5
    mort_fish_pred_I1: 50
    mort_fish_pred_I9: -50
    mort_fish_pred_hiding_factor: 0.5
    mort_fish_pred_P1: 5.0e-06
    mort_fish_pred_P9: -5.0
    mort_fish_pred_T1: 6.0
    mort_fish_pred_T9: 2.0
    mort_redd_dewater_surv: 0.98
    mort_redd_hi_temp_T1: 23
    mort_redd_hi_temp_T9: 17.5
    mort_redd_lo_temp_T1: -3.0  # v0.52.2: was -1; subarctic salmon eggs tolerate sustained 0-1°C incubation. With Tornionjoki winter floor 0.5°C and 7-month incubation (210 days), the old -1/1 curve gave 0.62^210 = essentially 0 cumulative survival. New -3/-1 puts 0.5°C far above T9, giving daily survival ≥0.99 → ~12% cumulative (low but non-zero, allowing FRY emergence).
    mort_redd_lo_temp_T9: -1.0
    mort_redd_scour_depth: 5
    redd_devel_A: 0.0019
    redd_devel_B: 0.0005
    redd_devel_C: 3.6e-05
    redd_area: 56000
    superind_max_rep: 10
    superind_max_length: 5
    spawn_depth_table:
      0: 0.0
      12: 0.0
      27: 0.95
      33.5: 1.0
      204: 0.0
    spawn_vel_table:
      0: 0.0
      2.3: 0.0
      3: 0.06
      54: 1.0
      61: 1.0
      192: 0.0
    smolt_min_length: 14.0
