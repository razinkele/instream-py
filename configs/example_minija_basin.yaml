# Minija drainage basin — Minija + 3 tributaries + Atmata branch + Curonian Lagoon + Baltic coast
#
# v0.54.3: extracted from example_baltic by selecting the reaches that
# form the Minija anadromous pathway. Replaces the v0.54.0 synthetic-
# geometry attempt (curated waypoints + buffered centerline); this fixture
# uses the real OSM polygon geometry built by the v0.51.0 example_baltic
# pipeline (`scripts/generate_baltic_example.py`).
#
# v0.54.4: added Atmata as a connector reach. Real geography: Minija
# does NOT have its own Lagoon mouth — it joins the Atmata branch (a
# Nemunas-Delta distributary) at Lankupiai, and Atmata then carries the
# combined flow past Drevernai into the Curonian Lagoon → Klaipėda
# Strait → Baltic Sea.
#
# v0.55.0: added 3 right-bank tributaries via Overpass OSM fetch
# (`_fetch_minija_tributaries_osm.py`) + hex cell generation
# (`_extend_minija_with_tributaries.py`). All three converge on Minija's
# upstream end (junction 3) — geographically simplified (real
# confluences are scattered along Minija's length) but topologically
# functional for an IBM where Minija is a single reach.
#
# Reaches (7 total, 5,406 cells):
#   Minija         — real Minija river OSM polygon, 425 cells
#                    (downstream junction = Atmata confluence at Lankupiai)
#   Babrungas      — ~22 km tributary, Lake Plateliai → Plungė, 1,711 cells
#   Salantas       — ~52 km north tributary near Salantai, 1,489 cells
#   Salpe          — Šalpė, small mid-river stream, 1,486 cells
#   Atmata         —  78 cells; Nemunas-Delta distributary
#   CuronianLagoon — Kuršių marios, 120 cells
#   BalticCoast    — nearshore Baltic N of Klaipėda, 97 cells
#
# Junction topology:
#   Babrungas (7→3), Salantas (8→3), Salpe (9→3) all → Minija (3→4)
#   Minija (3→4) → Atmata (4→5) → CuronianLagoon (2→5)
#   BalticCoast (5→6)
#
# Veiviržė deferred — Overpass returned 0 ways for the regex
# `^(Veiviržė|Veivirze)$` within the Minija-basin bbox. Likely a
# spelling/diacritic mismatch; v0.55.x candidate to investigate.
#
# Marine domain: Estuary → Coastal → Baltic Proper (abstract zones from baltic).
# Full lifecycle: egg → fry → parr → smolt → ocean → return → spawn
#
# Shapefile CRS: EPSG:3035 (ETRS89/LAEA Europe). Hydraulic base depths come
# from published real means (Curonian Lagoon 3.8 m, coast 10 m); Minija's
# per-flow scaling is synthetic because per-flow bathymetry isn't in OSM.

simulation:
  start_date: "2011-04-01"
  end_date: "2036-03-31"
  output_frequency: 1
  output_units: "days"
  seed: 42
  census_days:
    - "06-15"
    - "09-30"
  census_years_to_skip: 0
  population_file: "MinijaBasinExample-InitialPopulations.csv"
  adult_arrival_file: "MinijaBasinExample-AdultArrivals.csv"

  # WGBAST Arc L: per-(year, river) M74 YSFM forcing. Activate by
  # uncommenting and setting river_name on the WGBAST-comparable reaches
  # below (e.g. Nemunas → a real Lithuanian river not currently in the
  # Vuorinen series). For the placeholder CSV the forcing only fires on
  # "Simojoki" and "Tornionjoki"; Baltic fixtures lack a river_name match
  # so the cull is a no-op for now.
  # m74_forcing_csv: "data/wgbast/m74_ysfm_series.csv"

performance:
  backend: "numpy"
  device: "cpu"
  trout_capacity: 12000
  redd_capacity: 3000
  jit_warmup: false

spatial:
  backend: "shapefile"
  mesh_file: "Shapefile/MinijaBasinExample.shp"
  gis_properties:
    cell_id: "ID_TEXT"
    reach_name: "REACH_NAME"
    area: "AREA"
    dist_escape: "M_TO_ESC"
    num_hiding_places: "NUM_HIDING"
    frac_vel_shelter: "FRACVSHL"
    frac_spawn: "FRACSPWN"

light:
  latitude: 55.7
  light_correction: 0.65
  light_at_night: 0.5
  twilight_angle: 6.0

